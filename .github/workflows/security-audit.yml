name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
  pull_request:
  push:
    branches:
      - main

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (strict)
        if: github.event_name != 'pull_request'
        run: npm audit --omit=dev --audit-level=high

      - name: Audit production dependencies (pull request advisory)
        if: github.event_name == 'pull_request'
        run: |
          npm audit --omit=dev --audit-level=high || \
          echo "::warning::npm audit reported high/critical vulnerabilities on PR; non-blocking advisory."

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit (strict)
        if: github.event_name != 'pull_request'
        run: cargo install cargo-audit --locked

      - name: Install cargo-audit (pull request advisory)
        if: github.event_name == 'pull_request'
        run: |
          cargo install cargo-audit --locked || \
          echo "::warning::cargo-audit install failed on PR; non-blocking advisory."

      - name: Audit Rust dependencies (strict)
        if: github.event_name != 'pull_request'
        run: cargo audit --manifest-path src-tauri/Cargo.toml

      - name: Audit Rust dependencies (pull request advisory)
        if: github.event_name == 'pull_request'
        run: |
          cargo audit --manifest-path src-tauri/Cargo.toml || \
          echo "::warning::cargo audit reported advisories on PR; non-blocking advisory."
